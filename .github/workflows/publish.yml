name: Publish Segment

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      segment:
        description: 'Segment to publish (e.g. zerobias/t_waf). Leave blank for all changed.'
        required: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    uses: zerobias-org/devops/.github/workflows/zbb-publish-reusable.yml@main
    with:
      ghcr-namespace: zerobias-org
      dispatch-input-name: segment
      dispatch-input-value: ${{ inputs.segment }}
    secrets: inherit
